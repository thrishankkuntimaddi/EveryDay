<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6d28d9"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Meditation figure (white strokes) -->
  <!-- Head -->
  <circle cx="50" cy="22" r="9" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <!-- Spine -->
  <line x1="50" y1="31" x2="50" y2="55" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Left arm -->
  <path d="M50 42 Q36 48 33 58" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- Right arm -->
  <path d="M50 42 Q64 48 67 58" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- Lotus / crossed legs -->
  <path d="M28 76 Q50 60 72 76" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M22 86 Q50 70 78 86" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Aura arcs -->
  <path d="M20 24 Q12 42 20 60" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
  <path d="M80 24 Q88 42 80 60" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
</svg>
